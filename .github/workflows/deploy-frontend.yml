name: CI/CD Frontend EduSchool

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "====== Début déploiement FRONTEND ======"
            
            cd ~/apps/frontend/eduschool/eduschooldauphin
            
            # Mise à jour du code
            git fetch origin
            git reset --hard origin/master
            
            echo "Déploiement du commit: $(git log -1 --oneline)"
            
            # Force la recréation des conteneurs
            docker compose stop angular-dauphin angular-college
            docker compose rm -f angular-dauphin angular-college
            
            # Rebuild sans cache
            docker compose build --no-cache angular-dauphin angular-college
            
            # Démarrage
            docker compose up -d angular-dauphin angular-college
            
            # Vérification
            sleep 3
            docker ps --filter "name=angular"
            
            echo "====== Rafraîchissement du Proxy Global (Nginx) ======"
            # On cible UNIQUEMENT le service nginx dans ~/infra
            cd ~/infra
            docker compose stop nginx
            docker compose rm -f nginx
            docker compose up -d nginx
            
            # Nettoyage
            docker image prune -f
            
            echo "====== Déploiement terminé ======"
