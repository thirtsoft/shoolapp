<!-- Team -->
<section id="team" class="pb-5" *ngIf="afficherLesEleves().length == 0">
  <div class="container">
    <h5 class="section-title h1">
      Vous n'avez aucun enfants inscrit à cet établissements
    </h5>
    <div class="row"></div>
  </div>
</section>
<!-- Team -->

<!-- Team -->
<section id="team" class="pb-5" *ngIf="afficherLesEleves().length > 0">
  <div class="container">
    <h5 class="section-title h1">MES ENFANTS</h5>
    <div class="row d-flex flex-nowrap overflow-auto">
      <!-- Team member -->
      <div
        class="col-xs-12 col-sm-6 col-md-4"
        *ngFor="let eleve of afficherLesEleves()"
      >
        <div class="image-flip">
          <div class="mainflip flip-0">
            <div class="frontside">
              <div class="card">
                <div class="card-body text-center">
                  <p>
                    <img
                      class="img-fluid"
                      src="https://cdn-0.codingyaar.com/wp-content/uploads/bootstrap-profile-card-image.jpg"
                      alt="card image"
                    />
                  </p>
                  <h4 class="card-title">
                    {{ eleve?.prenom }} - {{ eleve?.nom }}
                  </h4>
                  <p class="card-text">
                    {{ eleve?.niveauEleve }} - {{ eleve?.classeEleve }} -
                    {{ eleve?.anneeScolaire }}
                  </p>
                  <a
                    (click)="afficherDossier(eleve)"
                    class="btn btn-primary btn-sm"
                    ><i class="fa fa-plus"></i>voir dossier scolaire</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- Team -->
