<aside class="parent-sidebar" [class.is-open]="isOpen()">
  <button class="sidebar-close" (click)="close.emit()">✕</button>

  <!-- Profil élève -->
  <div class="ps-header">
    <div class="ps-ava">👦</div>
    <div class="ps-info">
      <div class="ps-nom">{{ eleve().nom }}</div>
      <div class="ps-classe">{{ eleve().classe }}</div>
      <div class="ps-moyenne">Moyenne : {{ eleve().moyenne }}/20</div>
    </div>
  </div>

  <!-- Statistiques rapides -->
  <div class="ps-stats">
    <div class="pss-card">
      <span class="pss-val">{{ eleve().moyenne }}/20</span>
      <span class="pss-lbl">Moyenne</span>
    </div>
    <div class="pss-row">
      <div class="pss-pill warning">
        <span>⚠️</span>
        {{ eleve().absences }} absences
      </div>
      <div class="pss-pill warning">
        <span>⏰</span>
        {{ eleve().retards }} retards
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="ps-nav">
    @for (item of navItems(); track item.id) {
      <button
        class="psn-item"
        [class.active]="vueActive() === item.id"
        (click)="navigate.emit(item.id)"
      >
        <span class="psn-ico">{{ item.ico }}</span>
        <span class="psn-label">{{ item.label }}</span>
        @if (item.badge) {
          <span class="psn-badge">{{ item.badge }}</span>
        }
      </button>
    }
  </nav>

  <!-- Footer — Déconnexion -->
  <div class="ps-footer">
    <button class="ps-deconnexion" (click)="deconnecter()">
      <span class="ps-ico">🚪</span>
      <span class="ps-label">Déconnexion</span>
    </button>
  </div>
</aside>
