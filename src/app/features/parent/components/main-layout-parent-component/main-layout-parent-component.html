<div class="parent-shell">
  <!-- Topbar -->
  <header class="parent-topbar">
    <button class="hamburger-btn" (click)="sidebarOpen.set(true)" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="pt-brand">👪 <span>Espace Parent</span></div>
    <div class="pt-info">
      <span class="pt-eleve">{{ eleve.nom }}</span>
      <span class="pt-sep">·</span>
      <span>{{ eleve.classe }}</span>
    </div>
    <div class="pt-time">{{ heure }}</div>
  </header>

  <div class="parent-body">
    <!-- Backdrop mobile -->
    @if (sidebarOpen()) {
      <div class="sidebar-backdrop" (click)="sidebarOpen.set(false)"></div>
    }

    <!-- Sidebar -->
    <app-side-bar-parent-component
      [isOpen]="sidebarOpen()"
      [vueActive]="vueActive()"
      [eleve]="eleve"
      (close)="sidebarOpen.set(false)"
      (navigate)="naviguer($event)"
      (deconnecter)="deconnecter()"
    ></app-side-bar-parent-component>

    <!-- Zone de contenu dynamique -->
    <div class="parent-view">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Bottom nav mobile -->
  <nav class="bottom-nav">
    @for (item of navMobilesItems; track item.id) {
      <button class="bn-btn" [class.active]="vueActive() === item.id" (click)="naviguer(item.id)">
        <span class="bn-ico">{{ item.ico }}</span>
        <span class="bn-lbl">{{ item.label }}</span>
      </button>
    }

    <button class="bn-btn" (click)="deconnecter()">
      <span class="bn-ico">🚪</span>
      <span class="bn-lbl">Quitter</span>
    </button>
  </nav>
</div>
