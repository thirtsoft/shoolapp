<div class="col-md-12">
  <div class="row">
    <div class="col-lg-12">
      <div class="card">
        <div class="card-body" style="margin-left: 28%">
          <h5 class="card-title">Modifier mon mot de passe</h5>
          <div class="row">
            <div class="col-md-12">
              <form [formGroup]="passwordUpdateFormGroup">
                <div class="form-group">
                  <label>Identifiant</label>
                  <input
                    class="form-control"
                    type="text"
                    name="username"
                    formControlName="username"
                    readonly="true"
                  />
                  <span class="profile-views"><i class="fas fa-user-circle"></i></span>
                </div>

                <div class="form-group">
                  <label>Mot de passe<span class="login-danger">*</span></label>
                  <input
                    class="form-control pass-input"
                    type="text"
                    [type]="hideCurrent ? 'password' : 'text'"
                    name="currentPassword"
                    formControlName="currentPassword"
                    required
                  />
                  <button
                    mat-icon-button
                    matSuffix
                    (click)="hideCurrent = !hideCurrent"
                    [attr.aria-label]="'Hide password'"
                    [attr.aria-pressed]="hideCurrent"
                  >
                    <!--   <mat-icon>{{
                      hideCurrent ? "visibility_off" : "visibility"
                    }}</mat-icon> -->
                  </button>
                  <span class="profile-views feather-eye toggle-password"></span>
                </div>

                <div class="form-group">
                  <label>Nouveau mot de passe <span class="login-danger">*</span></label>
                  <input
                    class="form-control pass-confirm"
                    type="text"
                    [type]="hideNew ? 'password' : 'text'"
                    name="passwordRepeat"
                    formControlName="newPassword"
                    required
                  />
                  <button
                    mat-icon-button
                    matSuffix
                    (click)="hideNew = !hideNew"
                    [attr.aria-label]="'Hide password'"
                    [attr.aria-pressed]="hideNew"
                  ></button>
                  <span class="profile-views feather-eye reg-toggle-password"></span>
                </div>
                <div class="form-group">
                  <label>Confirmer mot de passe <span class="login-danger">*</span></label>
                  <input
                    class="form-control pass-confirm"
                    type="text"
                    [type]="hideConfirm ? 'password' : 'text'"
                    name="passwordRepeat"
                    formControlName="confirmNewPassword"
                    required
                  />
                  <button
                    mat-icon-button
                    matSuffix
                    (click)="hideConfirm = !hideConfirm"
                    [attr.aria-label]="'Hide password'"
                    [attr.aria-pressed]="hideConfirm"
                  ></button>
                  <span class="profile-views feather-eye reg-toggle-password"></span>
                </div>
              </form>
              <button type="button" class="btn btn-danger" (click)="goBack()">Fermer</button>
              <button
                type="button"
                class="btn btn-primary"
                [disabled]="!passwordUpdateFormGroup.valid"
                (click)="onSubmit()"
              >
                Enregistrer la modification
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
