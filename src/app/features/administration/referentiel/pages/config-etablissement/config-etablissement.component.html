<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col-sm-7 col-auto">
          <h3 class="page-title"></h3>
          <ul class="breadcrumb"></ul>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-12 col-lg-12 col-xl-12">
        <div class="card">
          <h3 class="page-title text-center" style="margin-top: 30px">
            {{ title }}
          </h3>
          <div class="card-body">
            <form [formGroup]="parametreEtablissementFormGroup">
              <input
                type="text"
                readonly="true"
                hidden="true"
                formControlName="id"
              />
              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Nom <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="nom"
                      required
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Slogan</label>
                    <input
                      type="text"
                      formControlName="slogan"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Ville </label>
                    <input
                      type="text"
                      formControlName="ville"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Adresse <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="adresse"
                      required
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Téléphone <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="telephone"
                      required
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Email </label>
                    <input
                      type="text"
                      formControlName="email"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Site wéb</label>
                    <input
                      type="text"
                      formControlName="siteWeb"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-12">
                  <div class="form-group">
                    <label>Logo</label>

                    <input type="file" (change)="onLogoSelected($event)" />
                    <div *ngIf="logoPreview" class="logo-preview">
                      <img [src]="logoPreview" alt="Logo aperçu" width="150" />
                    </div>
                  </div>
                </div>
              </div>

              <div class="row mt-3">
                <div class="col-12 d-flex justify-content-between">
                  <button
                    type="button"
                    class="btn btn-danger si_accept_cancel"
                    (click)="goBack()"
                  >
                    Annuler
                  </button>
                  <button
                    type="button"
                    class="upload-text text-white"
                    style="
                      align-items: center;
                      border: 1px solid #028ee1;
                      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
                      background-color: #028ee1;
                      min-height: 44px;
                      padding: 10px 16px;
                      cursor: pointer;
                    "
                    (click)="miseAJoutParametresEtablissement()"
                  >
                    <i class="fas fa-save"></i>
                    Enregistrer
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
