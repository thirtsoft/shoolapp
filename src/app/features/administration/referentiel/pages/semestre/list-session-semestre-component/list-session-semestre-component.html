<app-generic-table-referentiel
  title="Liste des sessions de semestres"
  titleFitre="sessionSemestre"
  [tableColumns]="columns"
  [tableData]="sessionSemestreData"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  [isLoading]="isLoading"
  [isEditIcon]="isEdit"
  [isLockableIcon]="isLockable"
  (pageChange)="changePage($event)"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
  addButtonLink="/admin/referentiel/session/create"
  modifierButtonLink="/admin/referentiel/session/edit"
>
</app-generic-table-referentiel>
