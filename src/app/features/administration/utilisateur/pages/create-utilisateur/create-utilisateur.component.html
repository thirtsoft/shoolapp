<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col-sm-7 col-auto">
          <h3 class="page-title">Personnel</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item">
              <a [routerLink]="'/admin/'">Tableau de bord</a>
            </li>
            <li class="breadcrumb-item active">{{ title }}</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body">
            <form [formGroup]="utilisateurFormGroup">
              <input
                type="text"
                readonly="true"
                hidden="true"
                formControlName="id"
              />
              <div class="row form-row">
                <div class="col-12 col-sm-12">
                  <div class="form-group">
                    <label>Civilité <span class="text-danger">*</span></label>
                    <select
                      class="form-control select"
                      name="civility"
                      formControlName="civility"
                    >
                      <option>Selectionnez</option>
                      <option *ngFor="let item of civilites" [value]="item">
                        {{ item }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Nom <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="nom"
                      required
                      placeholder="nom"
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Prénom <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="prenom"
                      required
                      placeholder="prenom"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Adresse <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="address"
                      placeholder="adresse"
                      class="form-control"
                    />
                  </div>
                </div>
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Email <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="email"
                      required
                      placeholder="email"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Téléphone <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="telephone"
                      required
                      placeholder="telephone"
                      class="form-control"
                    />
                  </div>
                </div>
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label
                      >Nom utilisateur <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      formControlName="username"
                      required
                      placeholder="username"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-6 col-sm-6">
                  <label>Profil <span class="text-danger">*</span></label>
                  <select
                    class="form-control select"
                    name="profileId"
                    formControlName="profileId"
                    required=""
                  >
                    <option>Selectionnez</option>
                    <option *ngFor="let profil of profils" [value]="profil.id">
                      {{ profil.libelle }}
                    </option>
                  </select>
                </div>
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Profession <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="profession"
                      placeholder="profession"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 25px col-sm-12">
              <button
                type="button"
                class="btn btn-primary si_accept_confirm float-lg-right"
                id="btn-yes"
                (click)="ajouterPersonnel()"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                (click)="goBack()"
              >
                Annuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
