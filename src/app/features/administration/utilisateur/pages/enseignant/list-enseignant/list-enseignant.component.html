<app-generic-table-referentiel
  title="Liste des enseignants"
  titleFitre="Enseignant"
  [tableColumns]="columns"
  [tableData]="enseignantData"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  [isLoading]="isLoading"
  [isEditIcon]="isEdit"
  [isEyesIcon]="true"
  [isLockableIcon]="isLockable"
  (pageChange)="changePage($event)"
  addButtonLink="/admin/utilisateur/enseignant/create"
  modifierButtonLink="/admin/utilisateur/enseignant/edit"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
  affecterButtonLink="/admin/utilisateur/enseignant/affecter"
  detailButtonLink="/admin/utilisateur/enseignant/details"
>
</app-generic-table-referentiel>
