<app-generic-table-dossier
  title="Liste des evaluations"
  titleFitre="Evaluation"
  [tableColumns]="columns"
  [tableData]="evaluationData"
  [isLoading]="isLoading"
  [isEditIcon]="isEdit"
  [showEditOrDeleteCondition]="canEditOrDeleteEvaluation.bind(this)"
  [isEyesIcon]="true"
  [isLockableIcon]="isLockable"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  (pageChange)="changePage($event)"
  addButtonLink="/admin/dossier-eleve/evaluation"
  modifierButtonLink="/admin/dossier-eleve/evaluation/edit"
  detailButtonLink="/admin/dossier-eleve/evaluation/details"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
>
</app-generic-table-dossier>
