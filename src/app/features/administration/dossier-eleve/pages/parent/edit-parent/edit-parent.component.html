<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <h3 class="page-title text-center mb-2">{{ title }}</h3>
        <div class="card">
          <div class="card-body">
            <form [formGroup]="parentFormGroup">
              <div style="margin-top: 5px">
                <input
                  type="text"
                  readonly="true"
                  hidden="true"
                  formControlName="id"
                />
                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Civilité <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="civility"
                        formControlName="civility"
                      >
                        <option>Selectionnez</option>
                        <option *ngFor="let item of civilites" [value]="item">
                          {{ item }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Nom utilisateur
                        <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        formControlName="username"
                        required
                        placeholder="username"
                        class="form-control"
                      />
                    </div>
                  </div>
                </div>
                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Prénom <span class="text-danger">*</span></label>
                      <input
                        type="text"
                        formControlName="prenom"
                        required
                        placeholder="prénom"
                        class="form-control"
                      />
                    </div>
                  </div>
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Nom <span class="text-danger">*</span></label>
                      <input
                        type="text"
                        formControlName="nom"
                        required
                        placeholder="nom"
                        class="form-control"
                      />
                    </div>
                  </div>
                </div>

                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Address <span class="text-danger">*</span></label>
                      <input
                        type="text"
                        formControlName="address"
                        required
                        placeholder="address"
                        class="form-control"
                      />
                    </div>
                  </div>
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Téléphone <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        formControlName="telephone"
                        required
                        placeholder="telephone"
                        class="form-control"
                      />
                    </div>
                  </div>
                </div>
                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Email <span class="text-danger">*</span></label>
                      <input
                        type="text"
                        formControlName="email"
                        required
                        placeholder="email"
                        class="form-control"
                      />
                    </div>
                  </div>
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Profession <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        formControlName="profession"
                        placeholder="profession"
                        class="form-control"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 75px col-sm-12">
              <button
                type="button"
                class="btn btn-primary si_accept_confirm float-lg-right"
                id="btn-yes"
                (click)="ajoutereditParent()"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                routerLink="/admin/dossier-eleve/parent"
              >
                Annuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
