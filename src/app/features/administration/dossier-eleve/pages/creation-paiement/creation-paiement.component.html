<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col-sm-7 col-auto">
          <h3 class="page-title">Paiement</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item">
              <a [routerLink]="'/admin/'">Tableau de bord</a>
            </li>
            <li class="breadcrumb-item active">{{ title }}</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body" *ngIf="!paiementId">
            <button class="btn btn-success" (click)="onAddPaiementItem()">
              <i class="fas fa-plus-circle"></i> Ajouter un paiement
            </button>
            <form [formGroup]="paiementFormGroup">
              <div formArrayName="paiements" style="margin-top: 5px">
                <div
                  *ngFor="let pay of paiements().controls; let i = index"
                  [formGroupName]="i"
                >
                  <input
                    type="text"
                    readonly="true"
                    hidden="true"
                    formControlName="id"
                  />
                  <div class="row form-row">
                    <div class="col-lg-12 col-sm-12">
                      <div class="form-group">
                        <label>Code <span class="text-danger">*</span></label>
                        <input
                          type="text"
                          formControlName="code"
                          required
                          placeholder="code"
                          class="form-control"
                        />
                      </div>
                    </div>
                  </div>

                  <div class="row form-row">
                    <div class="col-lg-6 col-sm-12">
                      <div class="form-group">
                        <label>Elève <span class="text-danger">*</span></label>
                        <!--  <select class="form-control select" name="eleveDTO" formControlName="eleveDTO" required="">
                          <option>Selectionnez</option>
                          <option *ngFor="let item of eleves" [value]="item">
                            {{ item.prenom }} - {{ item.nom }}
                          </option>
                        </select>  -->
                      <!--   <ng-select
                          [multiple]="false"
                          [closeOnSelect]="false"
                          [searchable]="false"
                          class="form-control"
                          formControlName="eleveDTO"
                        >
                          <ng-option [value]="0">Selectionnez</ng-option>
                          <ng-option [value]="item" *ngFor="let item of eleves">
                            {{ item.prenom }} - {{ item.nom }}</ng-option
                          >
                        </ng-select>  -->
                      </div>
                    </div>
                    <div class="col-lg-6 col-sm-12">
                      <div class="form-group">
                        <label>Mois <span class="text-danger">*</span></label>
                        <select
                          class="form-control select"
                          name="mois"
                          formControlName="mois"
                          required=""
                        >
                          <option>Selectionnez</option>
                          <option *ngFor="let item of listeMois" [value]="item">
                            {{ item }}
                          </option>
                        </select>
                      </div>
                    </div>
                  </div>

                  <div class="row form-row">
                    <div class="col-xs-12 col-lg-12 col-sm-12 mb-4">
                      <div class="well">
                        <strong>Type paiement :</strong>
                        <!--  <div class="row checklist" style="margin-left: 15px;">
                          <div class="checkbox col-lg-6 col-sm-12" *ngFor="let typePay of listTypePaiements">
                            <label style="white-space: nowrap;">
                              <input class="form-check-inline" type="checkbox"

                                [checked]="isSelected(typePay?.id, i)"
                                (change)="onChangeTypePaiement(typePay, $event.checked, i)">{{typePay.libelle}}</label>

                          </div>
                        </div> -->

                      <!--   <ng-select
                          [multiple]="true"
                          [closeOnSelect]="false"
                          [searchable]="false"
                          class="form-control"
                          formControlName="typePaiements"
                        >
                          <ng-option
                            [value]="item"
                            *ngFor="let item of listTypePaiements"
                            >{{ item.libelle }}</ng-option
                          >
                        </ng-select> -->
                      </div>
                    </div>

                    <button
                      class="btn btn-danger float-right"
                      (click)="removePaiementItem(i)"
                    >
                      <i class="fas fa-trash-alt"></i>
                      supprimer
                    </button>
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 75px col-sm-12">
              <button
                type="button"
                class="btn btn-success si_accept_confirm float-lg-right"
                id="btn-yes"
                (click)="ajouterPaiement()"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                routerLink="/admin/dossier-eleve/paiement"
              >
                Annuler
              </button>
            </div>
          </div>

          <!--  Edit mode  -->
          
          <div class="card-body" *ngIf="paiementId">
            <form [formGroup]="editPaiementFormGroup">
              <input
                type="text"
                readonly="true"
                hidden="true"
                formControlName="id"
              />
              <div class="row form-row">
                <div class="col-lg-12 col-sm-12">
                  <div class="form-group">
                    <label>Code <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="code"
                      required
                      placeholder="code"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label>Elève <span class="text-danger">*</span></label>
                  <!--   <ng-select
                      [multiple]="false"
                      [closeOnSelect]="false"
                      [searchable]="false"
                      class="form-control"
                      formControlName="eleveDTO"
                    >
                      <ng-option [value]="item.id" *ngFor="let item of eleves">
                        {{ item.prenom }} - {{ item.nom }}</ng-option
                      >
                    </ng-select> -->
                  </div>
                </div>
                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label>Mois <span class="text-danger">*</span></label>
                    <select
                      class="form-control select"
                      name="mois"
                      formControlName="mois"
                      required=""
                    >
                      <option>Selectionnez</option>
                      <option *ngFor="let item of listeMois" [value]="item">
                        {{ item }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-xs-12 col-lg-12 col-sm-12 mb-4">
                  <div class="well">
                    <strong>Type paiement :</strong>
                   <!--  <ng-select
                      [multiple]="true"
                      [closeOnSelect]="false"
                      [searchable]="false"
                      class="form-control"
                      formControlName="typePaiements"
                    >
                      <ng-option
                        [value]="item.id"
                        *ngFor="let item of listTypePaiements"
                        >{{ item.libelle }}</ng-option
                      >
                    </ng-select> -->
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 75px col-sm-12">
              <button
                type="button"
                class="btn btn-success si_accept_confirm float-lg-right"
                id="btn-yes"
                (click)="modifierPaiement()"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                routerLink="/admin/dossier-eleve/paiement"
              >
                Annuler
              </button>
            </div>
          </div>
           <!--  Edit mode  -->
        </div>
      </div>
    </div>
  </div>
</div>
