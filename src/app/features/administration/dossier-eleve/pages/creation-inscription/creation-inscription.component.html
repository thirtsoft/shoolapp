<div class="page-wrapper">
  <div class="content container-fluid">
    <!-- Page Header -->

    <div class="container">
      <div class="row form-row">
        <hr />
        <div class="col-sm-12">
          <div class="card">
            <h3 class="text-center" style="margin-top: 40px">{{ title }}</h3>
            <div class="card-body">
              <form [formGroup]="inscriptionFormGroup">
                <input
                  type="text"
                  readonly="true"
                  hidden="true"
                  matInput
                  formControlName="id"
                />

                <div class="row form-row">
                  <div class="col-lg-12 col-sm-12">
                    <div class="form-group">
                      <label>Elève <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="eleveId"
                        formControlName="eleveId"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option *ngFor="let eleve of eleves" [value]="eleve.id">
                          {{ eleve.prenom }} - {{ eleve.nom }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row form-row">
                  <div class="col-lg-6 col-sm-12">
                    <div class="form-group">
                      <label>Classe <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="classeId"
                        formControlName="classeId"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option
                          *ngFor="let class of classes"
                          [value]="class.id"
                        >
                          {{ class.libelle }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="col-lg-6 col-sm-12">
                    <div class="form-group">
                      <label
                        >Frais scolarité
                        <span class="text-danger">*</span></label
                      >
                      <input
                        type="number"
                        formControlName="montantInscription"
                        required
                        class="form-control"
                      />
                    </div>
                  </div>
                </div>

                <div class="row form-row">
                  <div class="col-lg-12 col-sm-12">
                    <div class="form-group">
                      <label
                        >Année scolaire
                        <span class="text-danger">*</span></label
                      >
                      <select
                        class="form-control select"
                        name="anneeScolaireId"
                        formControlName="anneeScolaireId"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option
                          *ngFor="let annee of anneeScolaires"
                          [value]="annee.id"
                        >
                          {{ annee.libelle }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>
              </form>
              <div style="margin-top: 25px col-sm-12">
                <button
                  type="button"
                  class="btn btn-success si_accept_confirm float-lg-right"
                  id="btn-yes"
                  (click)="ajouterEditInscription()"
                >
                  Enregistrer
                </button>
                <button
                  id="prev"
                  type="button"
                  class="btn btn-danger si_accept_cancel float-left"
                  (click)="goBack()"
                >
                  Précédent
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
