<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col-sm-7 col-auto">
          <h3 class="page-title">Eleve</h3>
          <ul class="breadcrumb">
            <li class="breadcrumb-item">
              <a [routerLink]="'/admin/'">Tableau de bord</a>
            </li>
            <li class="breadcrumb-item active">{{ title }}</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body">
            <form [formGroup]="eleveFormGroup">
              <input
                type="text"
                readonly="true"
                hidden="true"
                matInput
                formControlName="id"
              />
              <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-12">
                  <div class="form-group">
                    <label>Prénom <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="prenom"
                      required
                      class="form-control"
                    />
                  </div>

                  <div class="form-group">
                    <label>Nom <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="nom"
                      required
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-lg-6 col-md-6 col-sm-12">
                  <div class="image-preview-container">
                    <img
                      *ngIf="preview"
                      [src]="preview"
                      class="preview"
                      alt="Photo de profil de l'élève"
                      style="max-width: 200px; max-height: 200px"
                    />

                    <div *ngIf="!preview" class="preview-placeholder">
                      <i class="fas fa-user fa-5x"></i>
                      <p>Aucune photo</p>
                    </div>

                    <input
                      id="imageUpload"
                      type="file"
                      accept="image/*"
                      (change)="selectFile($event)"
                    />

                    <div class="instructions">
                      <p class="mb-1">Formats acceptés: JPG, PNG</p>
                      <p class="mb-0">Taille maximale: 2MB</p>
                    </div>

                    <div *ngIf="message" class="error-message">
                      {{ message }}
                    </div>
                    <div
                      *ngIf="currentFile && !message"
                      class="success-message"
                    >
                      Image sélectionnée: {{ currentFile!.name }}
                    </div>
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label>Sexe <span class="text-danger">*</span></label>
                    <select
                      class="form-control select"
                      name="sexe"
                      formControlName="sexe"
                      required=""
                    >
                      <option>Selectionnez</option>
                      <option *ngFor="let item of typeSexe" [value]="item">
                        {{ item }}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label
                      >Date naissance<span class="text-danger">*</span></label
                    >
                    <input
                      type="date"
                      formControlName="dateNaissance"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
              <div class="row form-row">
                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label
                      >Lieu naissance <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      formControlName="lieuNaissance"
                      required
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-lg-6 col-sm-12">
                  <div class="form-group">
                    <label>Adresse <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="address"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-12 col-sm-12">
                  <div class="form-group">
                    <label
                      >Nationalite <span class="text-danger">*</span></label
                    >
                    <input
                      type="text"
                      formControlName="nationalite"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 25px col-sm-12">
              <button
                type="button"
                class="btn btn-success si_accept_confirm float-lg-right"
                id="btn-yes"
                (click)="editerUnEleve()"
                [disabled]="!eleveFormGroup.valid"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                (click)="goBack()"
              >
                Annuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
