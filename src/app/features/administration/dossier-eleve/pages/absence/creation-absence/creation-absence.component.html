<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body">
            <h3 class="page-title text-center mb-2">{{ title }}</h3>
            <form [formGroup]="absenceFormGroup">
              <div style="margin-top: 5px">
                <input
                  type="text"
                  readonly="true"
                  hidden="true"
                  formControlName="id"
                />

                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Classe <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="classId"
                        formControlName="classId"
                        required=""
                        (change)="onClasseSelected()"
                      >
                        <option value="">Selectionnez</option>
                        <option
                          *ngFor="let item of classeList"
                          [value]="item.id"
                        >
                          {{ item.libelle }}
                        </option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Année scolaire
                        <span class="text-danger">*</span></label
                      >
                      <select
                        class="form-control select"
                        name="classe"
                        formControlName="anneeScolaireId"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option
                          *ngFor="let item of anneeScolaireList"
                          [value]="item.id"
                        >
                          {{ item.libelle }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Elève <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="eleveId"
                        formControlName="eleveId"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option
                          *ngFor="let item of eleveList"
                          [value]="item.eleve"
                        >
                          {{ item.prenom }} - {{ item.nom }}
                        </option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label>Semestre <span class="text-danger">*</span></label>
                      <select
                        class="form-control select"
                        name="semestre"
                        formControlName="semestre"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option
                          *ngFor="let item of semestreList"
                          [value]="item.id"
                        >
                          {{ item.libelle }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row form-row">
                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Etat absence <span class="text-danger">*</span></label
                      >
                      <select
                        class="form-control select"
                        name="justifiee"
                        formControlName="justifiee"
                        required=""
                      >
                        <option>Selectionnez</option>
                        <option value="1">Justifiée</option>
                        <option value="0">Non justifiée</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-lg-6 col-sm-6">
                    <div class="form-group">
                      <label
                        >Date absence <span class="text-danger">*</span></label
                      >
                      <input
                        type="date"
                        required
                        class="form-control"
                        formControlName="dateAbsence"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-12 col-sm-12">
                  <div class="form-group">
                    <label>Motif <span class="text-danger">*</span></label>
                    <textarea
                      class="form-control select"
                      formControlName="motif"
                      required=""
                    ></textarea>
                  </div>
                </div>
              </div>
            </form>
            <div style="margin-top: 75px col-sm-12">
              <button
                type="button"
                class="btn btn-primary si_accept_confirm float-lg-right"
                id="btn-yes"
                [disabled]="!absenceFormGroup.valid"
                (click)="ajouterEditAbsence()"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn btn-danger si_accept_cancel float-left"
                (click)="goBack()"
              >
                Annuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
