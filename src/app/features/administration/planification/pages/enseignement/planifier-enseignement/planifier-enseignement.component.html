<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row">
        <div class="col-sm-7 col-auto">
          <h3 class="page-title"></h3>
          <ul class="breadcrumb"></ul>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-12 col-lg-12 col-xl-12">
        <div class="card">
          <h3 class="page-title text-center" style="margin-top: 50px">
            {{ title }}
          </h3>

          <div class="col-md-3 col-lg-3 col-xl-3 col-sm-3">
            <button
              class="btn btn-primary"
              (click)="onAddEnseignementItems()"
              [disabled]="isEdit || disableAddButton"
              style="
                align-items: center;
                border: 1px solid #028ee1;
                box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
                background-color: #028ee1;
                min-height: 44px;
                padding: 10px 16px;
                cursor: pointer;
              "
            >
              <i class="fas fa-plus-circle"></i>
              {{ isEdit ? "Modification en cours" : "Ajouter un enseignement" }}
            </button>
          </div>
          <div class="card-body">
            <form [formGroup]="enseignementFormGroup">
              <div formArrayName="enseignements">
                <div
                  *ngFor="
                    let enseignement of enseignementsArray.controls;
                    let i = index
                  "
                  [formGroupName]="i"
                  class="enseignement-item mb-4 p-3 border rounded"
                >
                  <div
                    class="d-flex justify-content-between align-items-center mb-3"
                  >
                    <h5>Enseignement {{ i + 1 }}</h5>
                    <button
                      *ngIf="enseignementsArray.length > 1"
                      type="button"
                      class="btn btn-danger btn-sm"
                      (click)="removeEnseignementItem(i)"
                    >
                      <i class="fas fa-trash"></i> Supprimer
                    </button>
                  </div>
                  <input
                    type="text"
                    readonly="true"
                    hidden="true"
                    formControlName="id"
                  />

                  <div class="row form-row">
                    <div class="col-3 col-sm-3">
                      <div class="form-group">
                        <label
                          >Enseignant <span class="text-danger">*</span></label
                        >
                        <select
                          [class.is-invalid]="
                            enseignement.get('enseignant')?.invalid &&
                            enseignement.get('enseignant')?.touched
                          "
                          class="form-control select"
                          formControlName="enseignant"
                          required=""
                        >
                          <option value="">Selectionnez enseignant</option>
                          <option
                            *ngFor="let item of enseigantList"
                            [value]="item.id"
                          >
                            {{ item.nomComplet }}
                          </option>
                        </select>
                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('enseignant')?.invalid &&
                            enseignement.get('enseignant')?.touched
                          "
                        >
                          L'enseignant est requis
                        </span>
                      </div>
                    </div>
                    <div class="col-3 col-sm-3">
                      <div class="form-group">
                        <label>Classe <span class="text-danger">*</span></label>
                        <select
                          class="form-control select"
                          formControlName="classe"
                          required=""
                          [class.is-invalid]="
                            enseignement.get('classe')?.invalid &&
                            enseignement.get('classe')?.touched
                          "
                        >
                          <option value="">Selectionnez une classe</option>
                          <option
                            *ngFor="let item of classeList"
                            [value]="item.id"
                          >
                            {{ item.libelle }}
                          </option>
                        </select>
                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('classe')?.invalid &&
                            enseignement.get('classe')?.touched
                          "
                        >
                          La classe est requise
                        </span>
                      </div>
                    </div>
                    <div class="col-3 col-sm-3">
                      <div class="form-group">
                        <label
                          >Matière <span class="text-danger">*</span></label
                        >
                        <select
                          class="form-control select"
                          formControlName="matiere"
                          [class.is-invalid]="
                            enseignement.get('matiere')?.invalid &&
                            enseignement.get('matiere')?.touched
                          "
                        >
                          <option value="">Selectionnez une matière</option>
                          <option
                            *ngFor="let item of matiereList"
                            [value]="item.id"
                          >
                            {{ item?.libelle }}
                          </option>
                        </select>

                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('matiere')?.invalid &&
                            enseignement.get('matiere')?.touched
                          "
                        >
                          La matière est requise
                        </span>
                      </div>
                    </div>

                    <div class="col-3 col-sm-3">
                      <div class="form-group">
                        <label
                          >Semestre <span class="text-danger">*</span></label
                        >
                        <select
                          class="form-control select"
                          formControlName="semestre"
                          [class.is-invalid]="
                            enseignement.get('semestre')?.invalid &&
                            enseignement.get('semestre')?.touched
                          "
                        >
                          <option value="">Selectionnez un semestre</option>
                          <option
                            *ngFor="let semestre of semestreList"
                            [value]="semestre.id"
                          >
                            {{ semestre?.libelle }}
                          </option>
                        </select>

                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('semestre')?.invalid &&
                            enseignement.get('semestre')?.touched
                          "
                        >
                          La matière est requise
                        </span>
                      </div>
                    </div>
                  </div>

                  <div class="row form-row">
                    <div class="col-4 col-sm-4">
                      <div class="form-group">
                        <label
                          >Année scolaire
                          <span class="text-danger">*</span></label
                        >
                        <select
                          class="form-control select"
                          formControlName="anneeScolaire"
                          [class.is-invalid]="
                            enseignement.get('anneeScolaire')?.invalid &&
                            enseignement.get('anneeScolaire')?.touched
                          "
                        >
                          <option value="">
                            Selectionnez une année scolaire
                          </option>
                          <option
                            *ngFor="let item of anneeScolaireList"
                            [value]="item.id"
                          >
                            {{ item?.libelle }}
                          </option>
                        </select>

                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('anneeScolaire')?.invalid &&
                            enseignement.get('anneeScolaire')?.touched
                          "
                        >
                          L'année scolaire est requise
                        </span>
                      </div>
                    </div>

                    <div class="col-lg-4 col-sm-4">
                      <div class="form-group">
                        <label
                          >Date de début
                          <span class="text-danger">*</span></label
                        >
                        <input
                          type="date"
                          formControlName="dateDebut"
                          required
                          class="form-control"
                          [class.is-invalid]="
                            enseignement.get('dateDebut')?.invalid &&
                            enseignement.get('dateDebut')?.touched
                          "
                        />

                        <span
                          class="invalid-feedback"
                          *ngIf="
                            enseignement.get('dateDebut')?.invalid &&
                            enseignement.get('dateDebut')?.touched
                          "
                        >
                          La date de début est requise
                        </span>
                      </div>
                    </div>

                    <div class="col-lg-4 col-sm-4">
                      <div class="form-group">
                        <label>Date de fin</label>
                        <input
                          type="date"
                          formControlName="dateFin"
                          class="form-control"
                        />
                      </div>
                    </div>
                  </div>

                  <div class="row form-row">
                    <div class="col-12 col-sm-12">
                      <div class="form-group">
                        <label
                          >Description <span class="text-danger">*</span></label
                        >
                        <textarea
                          name=""
                          type="text"
                          formControlName="description"
                          class="form-control"
                          id=""
                        ></textarea>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="row mt-3">
                <div class="col-12 d-flex justify-content-between">
                  <button
                    type="button"
                    class="btn btn-danger si_accept_cancel"
                    (click)="goBack()"
                  >
                    Annuler
                  </button>
                  <button
                    type="button"
                    class="upload-text text-white"
                    style="
                      align-items: center;
                      border: 1px solid #028ee1;
                      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
                      background-color: #028ee1;
                      min-height: 44px;
                      padding: 10px 16px;
                      cursor: pointer;
                    "
                    (click)="ajouteditEnseignement()"
                  >
                    Enregistrer
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
