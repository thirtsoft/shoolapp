<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col-sm-12">
          <h3 class="page-title">{{ title }}</h3>
          <p class="text-muted mt-1 mb-0">
            <i class="fas fa-sticky-note me-1"></i> Gestion des notes d'information
          </p>
        </div>
      </div>
    </div>

    <div class="badge-container">
      <span class="badge badge-primary">
        <i class="fas fa-plus-circle me-1"></i>
        @if (!isEdit) {
          Nouvelle note
        } @else {
          Modification
        }
      </span>
    </div>

    <div class="card">
      <div class="card-body p-4 p-md-5">
        <div class="step-indicator">
          <div class="step active">
            <span class="step-number">1</span>
            <span class="step-label">Rédaction</span>
          </div>
          <div class="step-line"></div>
          <div class="step">
            <span class="step-number">2</span>
            <span class="step-label">Publication</span>
          </div>
        </div>

        <form [formGroup]="noteInformationFormGroup" (ngSubmit)="ajoutereditNoteInformation()">
          <input type="hidden" formControlName="id" />
          <label class="form-label">
            Description <span class="text-danger">*</span>
            <i class="fas fa-align-left ms-1 text-muted"></i>
          </label>

          <div class="ngx-editor-word-wrapper">
            <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>

            <div class="word-page-container">
              <div class="word-document-page">
                <ngx-editor [editor]="editor" formControlName="description"
                 placeholder="Saisissez le contenu de la note d'information..."></ngx-editor>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="goBack()">
              <i class="fas fa-times me-2"></i>Annuler
            </button>
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="!noteInformationFormGroup.valid"
            >
              <i class="fas fa-save me-2"></i>
              @if (!isEdit) {
                Publier la note
              } @else {
                Modifier la note
              }
            </button>
          </div>

          <div class="alert-help mt-4" role="alert">
            <i class="fas fa-info-circle me-2"></i>
            <span>
              Les notes d'information permettent de communiquer des messages importants à l'ensemble
              de la communauté scolaire.
            </span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
