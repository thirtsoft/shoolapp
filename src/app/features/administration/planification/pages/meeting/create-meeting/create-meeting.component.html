<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="row justify-content-center">
      <div class="col-md-12 col-lg-12 col-xl-12">
        <div class="card">
          <h3 class="page-title text-center" style="margin-top: 50px">
            {{ title }}
          </h3>

          <div class="card-body">
            <form [formGroup]="meetingFormGroup">
              <input
                type="text"
                readonly="true"
                hidden="true"
                formControlName="id"
              />
              <div class="row form-row">
                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label>Titre <span class="text-danger">*</span></label>
                    <input
                      type="text"
                      formControlName="libelle"
                      required
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-6 col-sm-6">
                  <div class="form-group">
                    <label
                      >Nature réunion <span class="text-danger">*</span></label
                    >

                    <select
                      class="form-control select"
                      name="sexe"
                      formControlName="typeReunion"
                      required=""
                    >
                      <option value="">Selectionnez</option>
                      <option *ngFor="let item of typeReunions" [value]="item">
                        {{ item }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-4 col-sm-4">
                  <div class="form-group">
                    <label>Date début <span class="text-danger">*</span></label>
                    <input
                      type="date"
                      formControlName="dateMeeting"
                      required
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-lg-4 col-sm-4">
                  <div class="form-group">
                    <label
                      >Heure début <span class="text-danger">*</span></label
                    >
                    <input
                      type="time"
                      formControlName="heureDebut"
                      class="form-control"
                    />
                  </div>
                </div>

                <div class="col-lg-4 col-sm-4">
                  <div class="form-group">
                    <label>Heure fin <span class="text-danger">*</span></label>
                    <input
                      type="time"
                      formControlName="heureFin"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="row form-row">
                <div class="col-lg-12 col-sm-12">
                  <div class="form-group">
                    <label>Description </label>
                    <textarea
                      name=""
                      type="text"
                      formControlName="description"
                      class="form-control"
                      id=""
                    ></textarea>
                  </div>
                </div>
              </div>

              <div class="row mt-3">
                <div class="col-12 d-flex justify-content-between">
                  <button
                    type="button"
                    class="btn btn-danger si_accept_cancel"
                    (click)="goBack()"
                  >
                    Annuler
                  </button>
                  <button
                    type="button"
                    class="upload-text text-white"
                    style="
                      align-items: center;
                      border: 1px solid #028ee1;
                      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
                      background-color: #028ee1;
                      min-height: 44px;
                      padding: 10px 16px;
                      cursor: pointer;
                    "
                    (click)="ajoutereditMeeting()"
                  >
                    Enregistrer
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
