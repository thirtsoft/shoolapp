<app-generic-table-referentiel
  title="Liste des plats de la semaine"
  titleFitre="Evenement"
  [tableColumns]="columns"
  [tableData]="planningRepasData"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  [isLoading]="isLoading"
  [isEditIcon]="isEdit"
  [isLockableIcon]="isLockable"
  (pageChange)="changePage($event)"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [isEyesIcon]="true"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
  addButtonLink="/admin/planification/cantine/create"
  modifierButtonLink="/admin/planification/cantine/edit"
  detailButtonLink="/admin/planification/cantine/details"
>
</app-generic-table-referentiel>
