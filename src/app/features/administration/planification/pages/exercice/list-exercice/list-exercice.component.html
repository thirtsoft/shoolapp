<app-generic-table-dossier
  title="Liste des exercices"
  titleFitre="Exercice"
  [tableColumns]="columns"
  [tableData]="exerciceData"
  [isLoading]="isLoading"
  [isEditIcon]="true"
  [isLockableIcon]="isLockable"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  (pageChange)="changePage($event)"
  addButtonLink="/admin/planification/exercice/create"
  modifierButtonLink="/admin/planification/exercice/edit"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
>
</app-generic-table-dossier>
