<app-generic-table-dossier
  title="Liste des emploies du temps"
  titleFitre="Emploiedutemps"
  [tableColumns]="columns"
  [tableData]="emploidutempsData"
  [isLoading]="isLoading"
  [isEditIcon]="true"
  [isEyesIcon]="true"
  [isLockableIcon]="isLockable"
  [tableSizes]="tableSizes"
  [totalElements]="totalElements"
  [currentPage]="currentPage"
  [pageSize]="pageSize"
  (pageChange)="changePage($event)"
  addButtonLink="/admin/planification/emploi-du-temps/create"
  modifierButtonLink="/admin/planification/emploi-du-temps/edit"
  [deleteEndPoint]="deleteEndpoint"
  [showSearch]="false"
  [filtered]="tableFilters"
  (filterChange)="onFilterChange($event.filter, $event.value)"
  [showFilters]="true"
  (resetFilters)="resetFilters()"
  (sizeChange)="changeSize($event)"
  detailButtonLink="/admin/planification/emploi-du-temps/details"
>
</app-generic-table-dossier>
